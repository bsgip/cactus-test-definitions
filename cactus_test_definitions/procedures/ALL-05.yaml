Description: Individual Readings
Category: Monitoring
Classes:
  - A
Preconditions:
  db: preconditions/ALL-01.sql
Steps:
  ALL-05-001:
    event:
      type: GET-request-received
      parameters:
        endpoint: /mup
    actions:
      - type: enable-listeners
        parameters:
          listeners:
            - ALL-05-002
      - type: remove-listeners
        parameters:
          listeners:
            - ALL-05-001
      - type: set-post-rate
        parameters:
          rate_seconds: 60
      - type: set-poll-rate
        parameters:
          rate_seconds: 60
          
  ALL-05-002:
    event:
      type: POST-request-received
      parameters:
        endpoint: /mup
    actions:
      - type: enable-listeners
        parameters:
          listeners:
            - ALL-05-003
      - type: remove-listeners
        parameters:
          listeners:
            - ALL-05-002
  ALL-05-003:
    event:
      type: GET-request-received
      parameters:
        endpoint: /mup
    actions:
      - type: enable-listeners
        parameters:
          listeners:
            - ALL-05-004
      - type: remove-listeners
        parameters:
          listeners:
            - ALL-05-003
  ALL-05-004:
    event:
      type: wait
      parameters:
        duration_seconds: 300 # Wait for at least 4 sets of readings to arrive (with post rate 60 seconds)
    actions:
      - type: create-der-control
        parameters:
          start: $(now)
          duration_seconds: 600
          opModImpLimW: 0
          opModExpLimW: 0
      - type: remove-listeners
        parameters:
          listeners:
            - ALL-05-004
