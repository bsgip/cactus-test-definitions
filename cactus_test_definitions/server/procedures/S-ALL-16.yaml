Description: Active Control - Disconnect 
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2
 - v1.3

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: create-der-control
        parameters:
          status: active
          opModConnect: true
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DERControl
    checks:
      - type: end-device 
        parameters:
          matches_client: true
      - type: der-control
        parameters:
          minimum_count: 1
          opModConnect: true
          rampTms: null
          event_status: 1 # Active
    
  - id: (1) Disconnect
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: create-der-control
        parameters:
          status: active
          opModConnect: false
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DERControlList
          - DER
          - DERControl
    checks:
      - type: end-device 
        parameters:
          matches_client: true 
      - type: der-control
        parameters:
          minimum_count: 1
          opModConnect: false
          rampTms: null
          event_status: 1 # Active
      
  - id: (2) Connect
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: create-der-control
        parameters:
          status: active
          opModConnect: true
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DERControlList
          - DER
          - DERControl
    checks:
      - type: end-device 
        parameters:
          matches_client: true 
      - type: der-control
        parameters:
          minimum_count: 1
          opModConnect: true
          rampTms: null
          event_status: 1 # Active
