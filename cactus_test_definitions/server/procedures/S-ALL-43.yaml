Description: Update Poll Rates
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2
 - v1.3

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: ensure-fsa
        parameters:
          annotation: fsa1
      - type: ensure-der-program
        parameters:
          fsa_annotation: fsa1
      - type: set-poll-rate
        parameters:
          resource: DeviceCapability
          rate_seconds: 300
      - type: set-poll-rate
        parameters:
          resource: EndDeviceList
          rate_seconds: 300
      - type: set-poll-rate
        parameters:
          resource: FunctionSetAssignmentsList
          rate_seconds: 300
      - type: set-poll-rate
        parameters:
          resource: DERProgramList
          rate_seconds: 60
      - type: set-poll-rate
        parameters:
          resource: DERList
          rate_seconds: 60
      - type: set-poll-rate
        parameters:
          resource: MirrorUsagePointList
          rate_seconds: 60
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DeviceCapability
          - EndDeviceList
          - FunctionSetAssignmentsList
          - DERProgramList
          - DERList
          - MirrorUsagePoint
          - MirrorUsagePointList
    checks:
      - type: poll-rate
        parameters:
          resource: DeviceCapability
          poll_rate_seconds: 300
      - type: poll-rate
        parameters:
          resource: EndDeviceList
          poll_rate_seconds: 300
      - type: poll-rate
        parameters:
          resource: FunctionSetAssignmentsList
          poll_rate_seconds: 300
      - type: poll-rate
        parameters:
          resource: DERProgramList
          poll_rate_seconds: 60
      - type: poll-rate
        parameters:
          resource: DERList
          poll_rate_seconds: 60
      - type: poll-rate
        parameters:
          resource: MirrorUsagePointList
          poll_rate_seconds: 60
  
  - id: (1) UPDATE DeviceCapability poll-rate
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: set-poll-rate
        parameters:
          resource: DeviceCapability
          rate_seconds: 60
    action:
      type: refresh-resource
      parameters:
        resource: DeviceCapability
    checks:
      - type: poll-rate
        parameters:
          resource: DeviceCapability
          poll_rate_seconds: 60

  - id: (2) UPDATE EndDeviceList poll-rate
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: set-poll-rate
        parameters:
          resource: EndDeviceList
          rate_seconds: 60
    action:
      type: refresh-resource
      parameters:
        resource: EndDeviceList
    checks:
      - type: poll-rate
        parameters:
          resource: EndDeviceList
          poll_rate_seconds: 60
    
  - id: (3) UPDATE FunctionSetAssignmentsList poll-rate
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: set-poll-rate
        parameters:
          resource: FunctionSetAssignmentsList
          rate_seconds: 60
    action:
      type: refresh-resource
      parameters:
        resource: FunctionSetAssignmentsList
    checks:
      - type: poll-rate
        parameters:
          resource: FunctionSetAssignmentsList
          poll_rate_seconds: 60

  - id: (4) UPDATE DERProgramList poll-rate
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: set-poll-rate
        parameters:
          resource: DERProgramList
          rate_seconds: 120
    action:
      type: refresh-resource
      parameters:
        resource: DERProgramList
    checks:
      - type: poll-rate
        parameters:
          resource: DERProgramList
          poll_rate_seconds: 120

  - id: (5) UPDATE DERList poll-rate
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: set-poll-rate
        parameters:
          resource: DERList
          rate_seconds: 120
    action:
      type: refresh-resource
      parameters:
        resource: DERList
    checks:
      - type: poll-rate
        parameters:
          resource: DERList
          poll_rate_seconds: 120

  - id: (6) UPDATE MirrorUsagePointList poll-rate
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: set-poll-rate
        parameters:
          resource: MirrorUsagePointList
          rate_seconds: 120
    action:
      type: refresh-resource
      parameters:
        resource: MirrorUsagePointList
    checks:
      - type: poll-rate
        parameters:
          resource: MirrorUsagePointList
          poll_rate_seconds: 120
  
      
