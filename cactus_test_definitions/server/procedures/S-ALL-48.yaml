Description: Changing Ramp-Rates
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2
 - v1.3

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: create-default-der-control
        parameters:
          setGradW: 100
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DefaultDERControl
    checks:
      - type: default-der-control
        parameters:
          minimum_count: 1
          setGradW: 100