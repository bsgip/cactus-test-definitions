Description: Delayed Response to Cancelled Export Control
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: create-der-control
        parameters:
          status: active
          opModExpLimW: $(setMaxW * 2)
          duration_seconds: 60
      - type: create-default-der-control
        parameters:
          opModExpLimW: $(setMaxW * 0.3)
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DERControl
          - DefaultDERControl
    checks:
      - type: end-device 
        parameters:
          matches_client: true 
      - type: der-control
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          event_status: 1 # Active
      - type: default-der-control
        parameters:
          opModExpLimW: $(setMaxW * 0.3)
          minimum_count: 1

  - id: (1) Cancel active controls
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: clear-der-controls
        parameters:
          all: true
    action:
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control # Check event status has been updated
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          event_status: 2 # Cancelled
  
  - id: WAIT to see that cancelled responses are not immediately removed
    client: client
    action:
      type: wait
      parameters:
        duration_seconds: 30

  - id: (2) CHECK to see that cancelled responses are not immediately removed
    client: client
    action: 
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          event_status: 2 # Cancelled
  
  - id: (3) Response
    client: client
    action:
      type: respond-der-controls # send response status = 6 (Cancelled)