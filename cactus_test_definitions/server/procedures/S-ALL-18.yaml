Description: Active Control - Ramp Rates
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: create-der-control
        parameters:
          status: active
          opModExpLimW: 0
          opModImpLimW: 0
          rampTms: 3000
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DERControl
    checks:
      - type: end-device 
        parameters:
          matches_client: true
      - type: der-control
        parameters:
          minimum_count: 1
          opModExpLimW: 0
          opModImpLimW: 0
          rampTms: 3000 # 1/100 of a second: 30s
          event_status: 1 # Active
    