Description: Active Control - Control Combinations
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2
 - v1.3

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: create-der-control
        parameters:
          status: active
          opModExpLimW: $(setMaxW * 0.5)
          opModGenLimW: 0
          opModImpLimW: $(setMaxW * 0.5)
          opModLoadLimW: 0
          opModEnergize: false
          opModConnect: false
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DERControl
    checks:
      - type: end-device 
        parameters:
          matches_client: true
      - type: der-control
        parameters:
          minimum_count: 1
          opModExpLimW: $(setMaxW * 0.5)
          opModGenLimW: 0
          opModImpLimW: $(setMaxW * 0.5)
          opModLoadLimW: 0
          opModEnergize: false
          opModConnect: false
          rampTms: null
          event_status: 1 # Active
    