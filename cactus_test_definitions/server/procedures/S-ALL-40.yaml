Description: Default Controls - Control Combinations 
Category: Subscription / Notification
Classes:
 - A

TargetVersions:
 - v1.2
 - v1.3

Preconditions:
  required_clients:
    - id: client
      client_type: aggregator
  
Steps:
  - id: PRECONDITION 1 - CREATE END DEVICE
    repeat_until_pass: true
    instructions:
      - Create an EndDevice registration, and follow the subscription process as defined in test S-ALL-25.
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: ensure-fsa
        parameters:
          annotation: fsa1
      - type: ensure-der-program
        parameters:
          fsa_annotation: fsa1
      - type: ensure-der-control-list
        parameters:
          subscribable: true
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - FunctionSetAssignments
          - DERProgram
          - SubscriptionList
          - DERControl
          - DefaultDERControl
    checks:
      - type: end-device 
        parameters:
          matches_client: true
    
  - id: PRECONDITION2 - DDERC SUBSCRIBE
    action: 
      type: create-subscription
      parameters:
        sub_id: dderc_sub
        resource: DefaultDERControl

  - id: STEP 1 - CREATE Default DERC
    repeat_until_pass: true
    admin_instructions:
      - type: create-default-der-control
        parameters:
          opModExpLimW: $(setMaxW * 0.5)
          opModGenLimW: 0
          opModImpLimW: $(setMaxW * 0.5)
          opModLoadLimW: 0
    action:
      type: notifications
      parameters:
        sub_id: dderc_sub
        collect: true
    checks:
      - type: default-der-control
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 0.5)
          opModGenLimW: 0
          opModImpLimW: $(setMaxW * 0.5)
          opModLoadLimW: 0
          sub_id: dderc_sub