Description: LFDI Doesn't Match Certificate
Category: Edge Cases
Classes:
 - A

TargetVersions:
 - v1.2
 - v1.3

Preconditions:
  required_clients:
    - id: CLIENT-A
      client_type: device
    - id: CLIENT-B
      client_type: device

Steps:
  - id: PRECONDITION - register end device on clientA.
    client: CLIENT-A
    repeat_until_pass: true
    admin_instructions:
      - type: ensure-end-device
        client: CLIENT-A
        parameters:
          registered: true
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
    checks:
      - type: end-device # This will be the check that will block UNTIL there is an existing EndDevice registration
        parameters:
          matches_client: true

  - id: Step 1 - Attempt to upsert end device with that the client doesnt own - expect rejection
    client: CLIENT-B
    use_client_context: CLIENT-A
    action:
      type: insert-end-device
      parameters:
          expect_rejection: true
