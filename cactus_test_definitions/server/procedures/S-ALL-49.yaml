Description: Multiple DER Programs
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    instructions:
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: ensure-fsa
        parameters:
          annotation: fsa1
          primacy: 1
      - type: ensure-fsa
        parameters:
          annotation: fsa2
          primacy: 2
      - type: ensure-der-program
        parameters:
          fsa_annotation: fsa1
          primacy: 1
      - type: ensure-der-program
        parameters:
          fsa_annotation: fsa2
          primacy: 2
      - type: create-default-der-control
        parameters:
          primacy: 1
          opModExpLimW: $(setMaxW * 0.3)
      - type: create-der-control
        parameters:
          status: active
          primacy: 2
          opModExpLimW: $(setMaxW * 2)
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DefaultDERControl
          - DERControl
          - FunctionSetAssignments
    checks:
      - type: function-set-assignment
        parameters:
          minimum_count: 2
          maximum_count: 2
          matches_client_edev: true
      - type: der-program # DERP 1
        parameters:
          minimum_count: 1
          maximum_count: 1
          primacy: 1
          fsa_index: 0
      - type: der-program # DERP 2
        parameters:
          minimum_count: 1
          maximum_count: 1
          primacy: 2
          fsa_index: 1
      - type: default-der-control
        parameters:
          minimum_count: 1
          derp_primacy: 1
          opModExpLimW: $(setMaxW * 0.3)
      - type: der-control
        parameters:
          minimum_count: 1
          derp_primacy: 2
          opModExpLimW: $(setMaxW * 2)
