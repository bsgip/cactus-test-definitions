Description: Client Registration and PIN Validation
Category: Registration
Classes:
 - A

TargetVersions:
 - v1.2

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: MATCH PIN
    repeat_until_pass: true
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
          has_registration_link: true
    action:
      type: discovery
      parameters:
        resources:
          - Registration
    checks:
      - type: end-device # This will be the check that will block UNTIL there is an existing EndDevice registration
        parameters:
          matches_client: true 
          matches_pin: true

  
    

  
