Description: Default Control - Ramp Rate
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2
 - v1.3

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: create-default-der-control
        parameters:
          setGradW: 100
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DERControlList
          - DER
          - DefaultDERControl
    checks:
      - type: end-device 
        parameters:
          matches_client: true 
      - type: default-der-control
        parameters:
          setGradW: 100  # 1 % / second
          minimum_count: 1
