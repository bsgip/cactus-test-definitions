Description: Control Responses
Category: Control
Classes:
 - A

TargetVersions:
 - v1.2

Preconditions:
  required_clients:
    - id: client
  
Steps:
  - id: (A) PRECONDITION
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: ensure-end-device
        parameters:
          registered: true
      - type: create-der-control
        parameters:
          status: scheduled
          opModExpLimW: $(setMaxW * 2)
    action:
      type: discovery
      parameters:
        resources:
          - EndDevice
          - DERControl
    checks:
      - type: end-device 
        parameters:
          matches_client: true 
      - type: der-control
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          # replyTo should also be set but this check is implicit in later communications
          event_status: 0 # Scheduled


################################## TEST SECTION 1 - Receive, Start, Complete ##################################


  - id: (1b) DERControl 1 - Received
    client: client
    action:
      type: respond-der-controls # send response status = 1 (received) immediately after it is sent

  - id: (2) DERControl 1 - Active
    repeat_until_pass: true # The first DER Control can start any time and be of any duration.
    client: client
    action: 
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control # Check event status has been updated
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          event_status: 1 # Active
  
  - id: (2,3) DERControl 1 - Wait for started, completed
    repeat_until_pass: true # Wait until we have submitted started and completed Responses
    client: client
    action: 
      type: respond-der-controls # keep checking for Responses - continue until we've sent 2 (started) and 3 (completed)
    checks:
      - type: der-control-responses
        parameters:
          minimum_count: 1
          maximum_count: 1
          sent_response_type: 2 # EVENT_STARTED
      - type: der-control-responses
        parameters:
          minimum_count: 1
          maximum_count: 1
          sent_response_type: 3 # EVENT_COMPLETED

  - id: WAIT for completed DERControl to be removed from server
    client: client
    action:
      type: wait
      parameters:
        duration_seconds: 20

  - id: Check for Empty DERControls
    client: client
    action: 
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control
        parameters:
          maximum_count: 0  # Empty list of controls


################################## TEST SECTION 2 - CANCELLATION ##################################
  

  - id: (4) DERControl 2
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: create-der-control
        parameters:
          status: scheduled
          start_offset_seconds: 300
          duration_seconds: 600
          opModExpLimW: $(setMaxW * 2)
    action:
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          responseRequired: 3
          # replyTo should also be set but this check is implicit in later communications
          event_status: 0 # Scheduled
          # start time should be set to 5 mins, check is implicit in the next step
  
  - id: (4b) DERControl 2 - Received
    client: client
    action: 
      type: respond-der-controls # send response status = 1 (Received)
  
  - id: WAIT for DERControl start time
    client: client
    action:
      type: wait
      parameters:
        duration_seconds: 320 # 5 minutes and 20 second buffer

  - id: (4c) DERControl 2 - Started
    client: client
    action: 
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control # Check event status has been updated
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          event_status: 1 # Active

  - id: (4d) DERControl 2 - Started
    client: client
    action:
      type: respond-der-controls # send response status = 2 (Started)

  - id: (5) DERControl 2 - Cancelled.
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: clear-der-controls
        parameters:
          all: true
    action:
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          responseRequired: 3
          event_status: 2 # Cancelled
  
  - id: CHECK pt. 1 - Cancelled DERControl isnt just removed immediately (client has a chance to see cancellation)
    client: client
    action:
      type: wait
      parameters:
        duration_seconds: 10 # little buffer to check behaviour
  
  - id: CHECK pt. 2 - Cancelled DERControl isnt just removed immediately (client has a chance to see cancellation)
    client: client
    action: 
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control # Check DER Control still exists
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          event_status: 2 # Cancelled

  - id: (5b) DERControl 2 - Respond to cancelled DERControl
    client: client
    action: 
      type: respond-der-controls # Will post control response status = 6 (cancelled).

  - id: CLEAR OUT DERControls for next section of the test
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: clear-der-controls # not written but makes next section easier to test
        parameters:
          all: true
    action:
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control
        parameters:
          event_status: 0  # No scheduled controls remain
          maximum_count: 0
      - type: der-control
        parameters:
          event_status: 1  # No active controls remain
          maximum_count: 0


################################## TEST SECTION 3 - SUPERSEEDED ##################################


  - id: (6) DERControl 3
    repeat_until_pass: true
    client: client
    instructions:
      - The utility server is configured with a scheduled control with opModExpLimW = 200% of the DERs rated active power, responseRequired = 03 and replyTo set to the response endpoint on the test utility server, to begin in 10 minutes.
    admin_instructions:
      - type: create-der-control
        parameters:
          status: scheduled
          start_offset_seconds: 600
          opModExpLimW: $(setMaxW * 2)
    action:
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          responseRequired: 3
          # replyTo should also be set but this check is implicit in later communications
          event_status: 0 # Scheduled
          # start time should be set to 10 mins but we do not check here
  
  - id: (6b) Respond to scheduled DERControl 3
    client: client
    action: 
      type: respond-der-controls # Respond status = 1 (received).

  - id: (7) DERControl 3 - Cancel
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: clear-der-controls
        parameters:
          all: true
    action:
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control
        parameters:
          minimum_count: 1
          opModExpLimW: $(setMaxW * 2)
          responseRequired: 3
          event_status: 2 # Cancelled; no maximum_count — step 4's cancelled control (600s duration) may still be in the list

  - id: (7b) Respond to cancelled DERControl 3
    client: client
    action: 
      type: respond-der-controls # Will post control response status = 6 (cancelled).

  - id: (8) DERControl 4
    repeat_until_pass: true
    client: client
    admin_instructions:
      - type: create-der-control
        parameters:
          status: scheduled
          start_offset_seconds: 600
          opModExpLimW: $(setMaxW * 2)
    action:
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control
        parameters:
          minimum_count: 1
          maximum_count: 1
          opModExpLimW: $(setMaxW * 2)
          event_status: 0 # Scheduled

  - id: (8b) Respond to scheduled DERControl 4
    client: client
    action: 
      type: respond-der-controls # Will post control response status = 1 (received).

  - id: (9) DERControl 5
    repeat_until_pass: true
    client: client
    instructions:
      - The utility server configures an active control with the same primacy and an overlapping control window.
    admin_instructions:
      - type: create-der-control
        parameters:
          status: active
          duration: 700  # must overlap with step 8's window (also 600s); both fire within seconds of each other
          opModExpLimW: 0
    action:
      type: discovery
      parameters:
        resources:
          - DERControl
    checks:
      - type: der-control
        parameters:
          minimum_count: 1 # The control above should now be set to superseeded not scheduled, so still only one expected.
          maximum_count: 1
          opModExpLimW: 0
          event_status: 1 # Active
      - type: der-control
        parameters:
          opModExpLimW: $(setMaxW * 2)
          event_status: 4 # Superseeded
          minimum_count: 1
          maximum_count: 1

  - id: (9b) Respond to both updated controls
    client: client
    action: 
      type: respond-der-controls
