Description: Response to Cancelled Import Control
Category: DER
Classes:
  - DER-L

TargetVersions:
  - v1.2
  - v1.3-beta/storage
  - v1.3

Criteria:
  checks:
    - type: all-steps-complete
      parameters: {}

Preconditions:
  init_actions:
    - type: set-comms-rate
      parameters:
        dcap_poll_seconds: 60
        edev_list_poll_seconds: 60
        fsa_list_poll_seconds: 60
        der_list_poll_seconds: 60
        derp_list_poll_seconds: 60
        mup_post_seconds: 60
  checks:
    - type: end-device-contents
      parameters: {}
    - type: der-settings-contents
      parameters: {}
  actions:
    - type: create-der-program
      parameters:
        primacy: 0
    - type: set-default-der-control
      parameters:
        opModImpLimW: $(maxImportW * 0.3) # This is set by the LOA-09 test procedure.
        opModExpLimW: 0 # From TS5573 table 12.4.4
        setGradW: 27 # hundredths of a percent per second

  instructions:
    - DER should be importing at least 50% of its rated power.

Steps:
  # (precondition).
  PRECONDITION-STARTUP:
    instructions:
      - This step is to give time for the DER to start importing/exporting at least 50% of its rated power.
    event:
      type: GET-request-received
      parameters:
        endpoint: /edev/1/fsa/1/derp
    actions:
      - type: create-der-control
        parameters:
          start: $(now)
          duration_seconds: 600 # Must be at least 1.5 mins longer than the wait period below in order to be polled while still active
          opModExpLimW: $(maxExportW * 2)
          opModImpLimW: $(maxImportW * 2)
          tag: PRECONDITION
      - type: enable-steps
        parameters:
          steps:
            - PRECONDITION-STARTUP-WAIT
      - type: remove-steps
        parameters:
          steps:
            - PRECONDITION-STARTUP

  # (precondition)
  PRECONDITION-STARTUP-WAIT:
    instructions:
      - This step is to give time for the DER to start importing/exporting at least 50% of its rated power.
    event:
      type: wait
      parameters:
        duration_seconds: 480 # Ramp to 100% at 16%/min=6.5 mins, + 1.5 mins in case of late poll (=8 mins)
    actions:
      - type: enable-steps
        parameters:
          steps:
            - GET-DERC
      - type: remove-steps
        parameters:
          steps:
            - PRECONDITION-STARTUP-WAIT

  # (a, b)
  GET-DERC:
    event:
      type: GET-request-received
      parameters:
        endpoint: /edev/1/derp/1/derc
    actions:
      - type: cancel-active-der-controls
        parameters: {}
      - type: enable-steps
        parameters:
          steps:
            - WAIT-TILL-END
      - type: remove-steps
        parameters:
          steps:
            - GET-DERC

  # (b)
  WAIT-TILL-END:
    event:
      type: wait
      parameters:
        duration_seconds: 300 # Ramp from 100% to 30% at 16%/min
    actions:
      - type: remove-steps
        parameters:
          steps:
            - WAIT-TILL-END
      - type: finish-test
        parameters: {}
    instructions:
      - After cancellation, DER shall reduce import to the DefaultDERControl value of 30%
